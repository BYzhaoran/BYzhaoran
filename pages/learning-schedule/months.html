<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="月计划索引" />
  <title>月计划索引 | Learning Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Source+Han+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../learning/learning.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">
        <span class="brand-box">LS</span>
        <strong>24个月索引</strong>
      </div>
      <div class="actions">
        <a class="btn primary" href="../learning-schedule.html">总览入口</a>
        <a class="btn" href="plan.html">两年路线</a>
        <a class="btn" href="resources.html">资源索引</a>
      </div>
    </header>

    <section class="panel card" style="margin-bottom: 16px;">
      <h2>月执行卡片</h2>
      <p class="desc">点击任意月份进入三级页面查看任务细则。</p>
      <div id="month-grid" class="month-grid"></div>
    </section>

    <article class="panel article" id="doc-root">
      <p class="status">正在加载月计划说明...</p>
    </article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../learning/learning-render.js"></script>
  <script>
    const monthTitles = [
      "数学速成 + Python基础", "C++与算法工程习惯", "训练工程模板", "系统建模 + PID",
      "状态空间 + LQR", "MPC入门 + 控制对比报告", "PyTorch训练模板强化", "YOLO视觉任务闭环",
      "DL工程化自动化", "DQN实战", "PPO实战", "SAC/TD3 + MuJoCo任务封装",
      "ROS2基础工程", "感知-控制闭环", "ROS2 + 仿真协同", "DRL与控制器对比",
      "融合策略实现", "Sim2Real准备与域随机化", "一键工具链", "测试体系建设",
      "性能优化与部署", "VLA方向复现", "系统冻结与全链路验收", "作品集封装与职业化表达"
    ];

    const grid = document.getElementById("month-grid");
    monthTitles.forEach((title, index) => {
      const month = String(index + 1).padStart(2, "0");
      const a = document.createElement("a");
      a.href = `month.html?m=${month}`;
      a.innerHTML = `<strong>M${month}</strong><br /><span class="desc">${title}</span>`;
      grid.appendChild(a);
    });

    LearningSchedule.renderMarkdownTo({
      rootId: "doc-root",
      markdownPath: "月计划/README.md",
      sourceLabel: "Learning_Schedule/月计划/README.md"
    });
  </script>
</body>
</html>
